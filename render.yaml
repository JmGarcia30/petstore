services:
  - type: web
    name: petstore-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/v1/pets?page=0&pageSize=5
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: petstore-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: petstore-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: petstore-postgres
          property: password
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: CORS_ALLOWED_ORIGINS
        value: https://petstore-frontend.onrender.com

  - type: static
    name: petstore-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend.onrender.com/api/v1

databases:
  - name: petstore-postgres
    plan: free
    databaseName: petstore
    user: petstore
