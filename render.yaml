services:
  - type: web
    name: petstore-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/v1/pets?page=0&pageSize=5
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://dpg-d86tcq57vvec73aln02g-a:5432/petstore_ousu
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: petstore-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: petstore-postgres
          property: password
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: CORS_ALLOWED_ORIGINS
        value: https://petstore-ui.onrender.com

  - type: web
    name: petstore-ui
    env: node
    rootDir: frontend
    buildCommand: rm -rf node_modules package-lock.json && npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend-rxho.onrender.com/api/v1

databases:
  - name: petstore-postgres
    plan: free
    databaseName: petstore
    user: petstore
